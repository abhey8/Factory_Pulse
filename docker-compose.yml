services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Docker Compose uses the internal MongoDB service name. No manual edit is
      # needed here unless you point the container at an external MongoDB.
      MONGODB_URI: "mongodb://mongo:27017/factory_productivity"
      PORT: "3000"
      NODE_ENV: "production"
      # For a separate frontend, replace "*" with the frontend origin.
      CORS_ORIGIN: "*"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo-data:
